name: Sync main from upstream

on:
  schedule:
    - cron: "3/5 * * * *"        # каждые 5 минут
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.MIRROR_TOKEN }}
          fetch-depth: 0

      - name: Sync main branch
        run: |
          git remote add upstream https://github.com/EtoNeYaProject/EtoNeYaProject.github.io.git
          git fetch upstream
          git checkout main
          git reset --hard upstream/main
          git push origin main --force